obj:
  bg_color: 0xF4F6FA   # soft blue-gray page background
  text_color: 0x23272E # dark text for contrast
button:
  bg_color: 0xFFFFFF   # white card
  text_color: 0x23272E
  border_width: 1
  border_color: 0xDCE2EA
  radius: 16
  shadow_width: 0
  pressed:
    bg_color: 0xE3EDF9
  checked:
    bg_color: 0x3A7AFE # blue accent, matches garage-door "opened" color
    text_color: 0xFFFFFF
    border_color: 0x3A7AFE
bar:
  bg_color: 0xE0E3EB   # light gray bar
  text_color: 0x23272E
dropdown:
  bg_color: 0xFFFFFF
  text_color: 0x23272E
  border_color: 0x3A7AFE
  border_width: 1
  shadow_width: 2
