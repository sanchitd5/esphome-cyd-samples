binary_sensor:
  - platform: homeassistant
    id: back_door_door
    entity_id: ${ha_indoor_door_sensor}
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: indoor_door_status
            state:
              checked: !lambda return x;
        - lvgl.label.update:
            id: indoor_door_icon
            text: !lambda |-
              return x ? std::string{"\U000F081C"}   // mdi:door-open
                       : std::string{"\U000F081B"};  // mdi:door-closed
        - lvgl.label.update:
            id: indoor_door_state
            text: !lambda |-
              return x ? std::string{"open"} : std::string{"closed"};

  - platform: homeassistant
    id: garage_backyard_door_sensor_contact
    entity_id: ${ha_backyard_door_sensor}
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: backyard_door_status
            state:
              checked: !lambda return x;
        - lvgl.label.update:
            id: backyard_door_icon
            text: !lambda |-
              return x ? std::string{"\U000F081C"}   // mdi:door-open
                       : std::string{"\U000F081B"};  // mdi:door-closed
        - lvgl.label.update:
            id: backyard_door_state
            text: !lambda |-
              return x ? std::string{"open"} : std::string{"closed"};

text_sensor:
  - platform: homeassistant
    id: door_status
    entity_id: ${ha_door_status_sensor}
    on_value:
      then:
        - lvgl.widget.update:
            id: garage_door_btn
            state:
              checked: !lambda return x == "opened";
              disabled: !lambda return x != "opened" && x != "closed";
            bg_color: !lambda |-
              if (x == "opened") return lv_color_hex(0x3A7AFE);  // blue
              if (x == "closed") return lv_color_hex(0xE0E3EB);  // light gray
              return lv_color_hex(0xFFD600);                     // yellow (moving/unknown)
        - lvgl.label.update:
            id: garage_door_icon
            text: !lambda |-
              if (x == "opened" || x == "open")
                return std::string{"\U000F12D4"};  // mdi:garage-open-variant
              if (x == "opening" || x == "closing")
                return std::string{"\U000F0872"};  // mdi:garage-alert
              return std::string{"\U000F06D9"};    // mdi:garage
        - lvgl.label.update:
            id: garage_door_state
            text: !lambda return x;

  - platform: homeassistant
    id: lamp_status
    entity_id: ${ha_lamp_entity}
    on_value:
      then:
        - lvgl.widget.update:
            id: lamp_btn
            state:
              checked: !lambda return x == "on";
        - lvgl.label.update:
            id: lamp_icon
            text: !lambda |-
              return x == "on" ? std::string{"\U000F0335"}   // mdi:lightbulb
                               : std::string{"\U000F0336"};  // mdi:lightbulb-outline
